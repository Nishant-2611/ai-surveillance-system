<!DOCTYPE html>
<html>
<head>
<title>Smart Security Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#1f2937,#111827);
color:white;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:#111827;
box-shadow:0 3px 10px rgba(0,0,0,0.4);
}

.navbar h2{
font-weight:500;
}

.nav-right{
display:flex;
gap:20px;
align-items:center;
}

button{
background:#3498db;
border:none;
color:white;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#2980b9;
}

/* GRID */

.container{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
padding:20px;
}

/* VIDEO */

.video-container{
height:400px;
border-radius:12px;
overflow:hidden;
border:3px solid #3498db;
box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

.video-container img{
width:100%;
height:100%;
object-fit:cover;
}

/* CARD */

.card{
background:#1f2937;
border-radius:10px;
padding:15px;
box-shadow:0 4px 15px rgba(0,0,0,0.3);
}

.card h3{
margin-bottom:10px;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:10px;
}

.stat-item{
background:#374151;
padding:10px;
border-radius:8px;
text-align:center;
}

.stat-value{
font-size:20px;
font-weight:bold;
}

.stat-label{
font-size:12px;
}

/* ALERT */

#alert{
background:#e74c3c;
padding:10px;
border-radius:6px;
margin-bottom:10px;
display:none;
}

/* RECENT EVENTS */

ul{
list-style:none;
}

li{
padding:5px;
border-bottom:1px solid #444;
font-size:14px;
}

/* SCREENSHOTS */

.gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
}

.gallery img{
width:100%;
border-radius:6px;
}

/* ALERT POPUP */

.alertBox{
position:fixed;
bottom:20px;
right:20px;
background:#e74c3c;
padding:12px 20px;
border-radius:8px;
display:none;
animation:fade 0.4s;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

/* LIGHT MODE */

.light-mode{
background:#f4f6f8;
color:black;
}

.light-mode .card{
background:white;
}

</style>
</head>

<body>

<div class="navbar">

<h2>📹 Smart Security Dashboard</h2>

<div class="nav-right">

<span id="connection-status">🟢 Connected</span>

<span id="system-time"></span>

<button onclick="toggleTheme()">🌙</button>

</div>

</div>

<div class="container">

<!-- LEFT SIDE -->

<div>

<div class="video-container">

<img src="/video_feed">

</div>

<div class="card">

<h3>System Status</h3>

<div class="stats">

<div class="stat-item">
<div class="stat-value" id="status">Active</div>
<div class="stat-label">System</div>
</div>

<div class="stat-item">
<div class="stat-value" id="detections">0</div>
<div class="stat-label">Detections</div>
</div>

<div class="stat-item">
<div class="stat-value" id="uptime">--</div>
<div class="stat-label">Uptime</div>
</div>

</div>

</div>

</div>

<!-- RIGHT SIDE -->

<div>

<div class="card">

<h3>Alerts</h3>

<div id="alert"></div>

</div>

<div class="card">

<h3>Recent Events</h3>

<ul id="recentEvents"></ul>

</div>

<div class="card">

<h3>Screenshots</h3>

<div class="gallery" id="screenshots"></div>

</div>

</div>

</div>

<div id="alertBox" class="alertBox"></div>

<script>

/* CLOCK */

setInterval(()=>{

const now=new Date();

document.getElementById("system-time").innerText=
now.toLocaleTimeString();

},1000);


/* DARK MODE */

function toggleTheme(){

document.body.classList.toggle("light-mode");

}


/* INTERNET STATUS */

window.addEventListener("offline",()=>{

document.getElementById("connection-status").innerText="🔴 Offline";

});

window.addEventListener("online",()=>{

document.getElementById("connection-status").innerText="🟢 Connected";

});


/* MOTION HISTORY */

setInterval(()=>{

fetch("/api/detection/history")

.then(res=>res.json())

.then(data=>{

let recent=document.getElementById("recentEvents");

recent.innerHTML="";

data.slice(-5).forEach(event=>{

recent.innerHTML += "<li>"+event.eventType+" - "+event.timestamp+"</li>";

});

if(data.length>0){

let last=data[data.length-1];

let alertBox=document.getElementById("alert");

alertBox.style.display="block";

alertBox.innerText="⚠ Human detected at "+last.timestamp;

showAlert("🚨 Motion detected!");

}

});

},5000);


/* SCREENSHOTS */

setInterval(()=>{

fetch("/api/screenshots")

.then(res=>res.json())

.then(data=>{

let gallery=document.getElementById("screenshots");

gallery.innerHTML="";

data.slice(-6).forEach(s=>{

gallery.innerHTML += "<img src='/screenshots/"+s.name+"'>";

});

});

},10000);


/* POPUP ALERT */

function showAlert(msg){

const alertBox=document.getElementById("alertBox");

alertBox.innerText=msg;

alertBox.style.display="block";

setTimeout(()=>{

alertBox.style.display="none";

},4000);

}

</script>

</body>

</html>
