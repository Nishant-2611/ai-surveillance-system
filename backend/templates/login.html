<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureEye — Sign In</title>
  <meta name="description" content="SecureEye AI Smart Surveillance System — Secure Login" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body class="login-body">

  <div class="bg-grid"></div>

  <div class="login-wrap">
    <!-- Logo -->
    <div class="login-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M15 10a3 3 0 11-6 0 3 3 0 016 0z"/>
          <path d="M2 12C2 6.48 6.48 2 12 2s10 4.48 10 10-4.48 10-10 10S2 17.52 2 12z"
                stroke-dasharray="4 2"/>
          <path d="M12 2v2M12 20v2M2 12h2M20 12h2"/>
        </svg>
      </div>
      <h1 class="logo-title">SecureEye</h1>
      <p class="logo-sub">AI Smart Surveillance System</p>
    </div>

    <!-- Card -->
    <div class="login-card">
      <div class="tab-bar">
        <button class="tab-btn active" id="tabLogin"    onclick="switchTab('login')">Sign In</button>
        <button class="tab-btn"        id="tabRegister" onclick="switchTab('register')">Register</button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="loginUser">Username</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input type="text" id="loginUser" placeholder="Enter username" required autocomplete="username" />
          </div>
        </div>
        <div class="form-group">
          <label for="loginPass">Password</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0110 0v4"/>
              </svg>
            </span>
            <input type="password" id="loginPass" placeholder="Enter password" required autocomplete="current-password" />
          </div>
        </div>
        <div id="loginAlert" class="form-alert hidden"></div>
        <button type="submit" class="btn-primary" id="loginBtn">
          <span id="loginBtnText">Sign In</span>
          <span id="loginSpinner" class="spinner" style="display:none;"></span>
        </button>
      </form>

      <!-- Register Form -->
      <form id="registerForm" class="auth-form hidden" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label for="regUser">Username</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input type="text" id="regUser" placeholder="Choose a username" required />
          </div>
        </div>
        <div class="form-group">
          <label for="regPass">Password</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0110 0v4"/>
              </svg>
            </span>
            <input type="password" id="regPass" placeholder="Create a password" required />
          </div>
        </div>
        <div id="regAlert" class="form-alert hidden"></div>
        <button type="submit" class="btn-primary" id="regBtn">
          <span id="regBtnText">Create Account</span>
          <span id="regSpinner" class="spinner" style="display:none;"></span>
        </button>
      </form>
    </div>

    <p style="font-size:0.75rem;color:var(--text-3);">
      SecureEye v1.0 &nbsp;•&nbsp; AI Smart Surveillance
    </p>
  </div>

  <script>
    const API = '';  // same origin

    // Redirect if already logged in
    if (localStorage.getItem('se_token')) window.location.href = '/dashboard';

    function switchTab(tab) {
      document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
      document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
      document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
      document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
    }

    function showAlert(id, msg, type) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.className = `form-alert ${type}`;
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const spinner = document.getElementById('loginSpinner');
      const txt = document.getElementById('loginBtnText');
      btn.disabled = true; spinner.style.display = 'block'; txt.style.display = 'none';

      try {
        const res = await fetch(`${API}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('loginUser').value.trim(),
            password: document.getElementById('loginPass').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');
        localStorage.setItem('se_token', data.access_token);
        localStorage.setItem('se_user', data.user.username);
        window.location.href = '/dashboard';
      } catch (err) {
        showAlert('loginAlert', err.message, 'error');
        btn.disabled = false; spinner.style.display = 'none'; txt.style.display = 'block';
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('regBtn');
      const spinner = document.getElementById('regSpinner');
      const txt = document.getElementById('regBtnText');
      btn.disabled = true; spinner.style.display = 'block'; txt.style.display = 'none';

      try {
        const res = await fetch(`${API}/api/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('regUser').value.trim(),
            password: document.getElementById('regPass').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Registration failed');
        showAlert('regAlert', '✅ Account created! Switching to login…', 'success');
        setTimeout(() => switchTab('login'), 1200);
      } catch (err) {
        showAlert('regAlert', err.message, 'error');
      } finally {
        btn.disabled = false; spinner.style.display = 'none'; txt.style.display = 'block';
      }
    }
  </script>
</body>
</html>
